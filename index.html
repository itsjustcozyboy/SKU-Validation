<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>US K-Beauty SKU Demand Test</title>
    <script>
      (async () => {
        const loadBuild = async () => {
          const buildResponse = await fetch(`build.json?ts=${Date.now()}`, { cache: 'no-store' });
          if (!buildResponse.ok) {
            throw new Error('Unable to load build manifest');
          }

          const buildInfo = await buildResponse.json();
          const version = encodeURIComponent(buildInfo.version || Date.now().toString());

          if (buildInfo.css) {
            const styleLink = document.createElement('link');
            styleLink.rel = 'stylesheet';
            styleLink.href = `${buildInfo.css}?v=${version}`;
            document.head.appendChild(styleLink);
          }

          const script = document.createElement('script');
          script.type = 'module';
          script.src = `${buildInfo.js}?v=${version}`;
          document.head.appendChild(script);
        };

        try {
          await loadBuild();
        } catch (error) {
          await import('/src/main.tsx');
        }
      })().catch(() => {
        document.body.innerHTML = '<main style="padding:24px;font-family:sans-serif">Unable to load the app.</main>';
      });
    </script>
  </head>
  <body class="bg-white">
    <div id="root"></div>
  </body>
</html>
