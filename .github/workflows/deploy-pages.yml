name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'build.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish static site files
        run: npm run publish:pages -- ${{ github.sha }}

      - name: Commit published files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets build.json
          if git diff --cached --quiet; then
            echo "No published file changes"
            exit 0
          fi
          git commit -m "Publish updated Pages assets [skip ci]"
          git push origin HEAD:main
